<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mind Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
            overflow-y: auto;
        }
        .game-container-full {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .game-title {
            font-family: 'Special Elite', cursive;
        }
        .menu-button {
            background-color: #374151;
            color: white;
            transition: background-color 0.3s ease;
        }
        .menu-button:hover {
            background-color: #4b5563;
        }
        .game-scene {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 60vh;
            max-height: 500px;
            background-color: #f0f0f0;
            border-radius: 0.75rem;
            border: 4px solid #374151;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .scene-object {
            position: absolute;
            cursor: pointer;
            font-size: 2.2rem;
            transition: transform 0.2s ease-in-out, filter 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .scene-object:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px rgba(255, 255, 0, 0.9));
        }
        .inventory-item {
            cursor: pointer;
            font-size: 3rem;
            transition: transform 0.2s ease, background-color 0.2s;
        }
        .inventory-item.selected {
            transform: scale(1.1);
            background-color: rgba(251, 191, 36, 0.4);
            border-radius: 10px;
        }
        .message-box {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

<!-- Main Menu Screen -->
<div id="main-menu" class="game-container-full bg-gray-100">
    <h1 class="text-6xl md:text-8xl font-bold game-title text-gray-700 mb-12 text-center">Mind Check <span class="text-5xl md:text-7xl">🧠</span></h1>
    <div class="space-y-6 flex flex-col items-center">
        <button id="play-button" class="menu-button w-64 text-2xl font-bold py-3 px-6 rounded-lg">Play</button>
        <button id="options-button" class="menu-button w-64 text-2xl font-bold py-3 px-6 rounded-lg">Options</button>
        <button id="level-select-button" class="menu-button w-64 text-2xl font-bold py-3 px-6 rounded-lg">Level Select</button>
        <button id="exit-button" class="menu-button w-64 text-2xl font-bold py-3 px-6 rounded-lg">Exit</button>
    </div>
</div>

<!-- Options Screen -->
<div id="options-screen" class="hidden game-container-full bg-gray-100 p-8">
    <h2 class="text-5xl font-bold game-title text-gray-700 mb-10">Options</h2>
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border">
        <h3 class="text-2xl text-gray-700 font-semibold mb-4">Audio</h3>
        <div class="flex items-center justify-between">
            <span class="text-lg font-medium">Volume</span>
            <div class="flex items-center gap-4">
                <button id="volume-down" class="menu-button w-12 h-12 text-2xl rounded-full">-</button>
                <span id="volume-display" class="text-2xl font-bold w-16 text-center">10</span>
                <button id="volume-up" class="menu-button w-12 h-12 text-2xl rounded-full">+</button>
            </div>
        </div>
    </div>
    <button id="back-button" class="menu-button mt-12 w-64 text-2xl font-bold py-3 px-6 rounded-lg">Back</button>
</div>

<!-- Level Select Screen -->
<div id="level-select-screen" class="hidden game-container-full bg-gray-100 p-8">
    <h2 class="text-5xl font-bold game-title text-gray-700 mb-10">Select Level</h2>
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl border">
        <div id="level-grid" class="grid grid-cols-5 sm:grid-cols-8 lg:grid-cols-10 gap-3">
            <!-- Dynamically populated -->
        </div>
    </div>
    <button id="level-select-back-button" class="menu-button mt-12 w-64 text-2xl font-bold py-3 px-6 rounded-lg">Back</button>
</div>

<!-- Game Screen -->
<div id="game-container" class="hidden w-full max-w-4xl mx-auto p-4 flex-col justify-center min-h-screen">
    <header class="relative text-center mb-4 h-16 flex items-center justify-center">
        <!-- HAMBURGER MENU ICON -->
        <button id="main-menu-button" class="absolute left-0 top-1/2 -translate-y-1/2 p-2 rounded-lg hover:bg-gray-200">
            <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
        <div>
            <h1 class="text-4xl font-bold game-title text-gray-700">Mind Check <span class="text-3xl">🧠</span></h1>
            <p class="text-lg text-gray-500">Level <span id="level-display">1</span> of 50</p>
        </div>
    </header>

    <main class="bg-white p-4 sm:p-6 rounded-xl shadow-lg border border-gray-200">
        <div id="scenario-container" class="mb-4 text-center bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h2 class="text-xl sm:text-2xl font-semibold text-gray-700">Objective:</h2>
            <p id="scenario-text" class="text-gray-600 mt-2 text-base sm:text-lg"></p>
        </div>
        <div id="game-scene" class="game-scene mx-auto"></div>
        <div class="mt-4">
            <h3 class="text-xl font-semibold text-center mb-2 text-gray-700">Inventory</h3>
            <div id="inventory-box" class="flex items-center justify-center gap-4 bg-gray-200 p-3 rounded-lg min-h-[80px] border border-gray-300">
                <p id="empty-inventory-text" class="text-gray-500">Empty</p>
            </div>
        </div>
    </main>
</div>

<!-- Message Modal -->
<div id="message-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
    <div class="message-box bg-white rounded-lg shadow-2xl p-6 sm:p-8 text-center max-w-sm w-full">
        <p id="message-text" class="text-lg mb-6"></p>
        <button id="message-button" class="menu-button w-full font-bold py-2 px-6 rounded-lg">Continue</button>
    </div>
</div>

                    {

                    { id: 42, scenario: "A beekeeper needs a smoker to calm the bees.", clue: { name: 'smoker', emoji: '💨' }, target: { name: 'beehive', emoji: '🐝' }, objects: [{ emoji: '🏚️', name: 'shed', x: 15, y: 60, clue: true }, { emoji: '🧥', name: 'suit', x: 80, y: 65 }, { emoji: '🍯', name: 'jar', x: 45, y: 80 }] },
                    { id: 43, scenario: "A fortune teller needs her crystal ball.", clue: { name: 'crystal ball', emoji: '🔮' }, target: { name: 'table', emoji: '🃏' }, objects: [{ emoji: '🪟', name: 'curtains', x: 85, y: 50 }, { emoji: '📦', name: 'chest', x: 20, y: 75, clue: true }, { emoji: '💨', name: 'incense', x: 50, y: 80 }] },

                    { id: 45, scenario: "A scientist opened a portal. Find the device to close it.", clue: { name: 'device', emoji: '🌀' }, target: { name: 'portal', emoji: '🌀' }, objects: [{ emoji: '🖥️', name: 'console', x: 20, y: 70 }, { emoji: '🪵', name: 'table', x: 75, y: 80 }, { emoji: '🧥', name: 'coat', x: 50, y: 60, clue: true }] },
                    {

                        ],
                        objects: [
                            { emoji: '🏞️', name: 'pond', x: 15, y: 80, clue: 'frog leg' },
                            { emoji: '🗄️', name: 'shelf', x: 80, y: 50, clue: 'eye of newt' },
                            { emoji: '📖', name: 'spellbook', x: 50, y: 65},

                        ]
                    },
                    { id: 47, scenario: "A lumberjack needs his trusty flannel shirt.", clue: { name: 'flannel shirt', emoji: '👕' }, target: { name: 'lumberjack', emoji: '🧔' }, objects: [{ emoji: '🛖', name: 'cabin', x: 30, y: 60 }, { emoji: '〰️', name: 'line', x: 70, y: 55, clue: true }, { emoji: '🪓', name: 'stump', x: 50, y: 80 }] },
                    { id: 48, scenario: "A miner found gold but needs a pickaxe to get it.", clue: { name: 'pickaxe', emoji: '⛏️' }, target: { name: 'gold vein', emoji: '💰' }, objects: [{ emoji: '🛒', name: 'cart', x: 75, y: 75, clue: true }, { emoji: '🏮', name: 'lantern', x: 25, y: 65 }, { emoji: '🐦', name: 'cage', x: 50, y: 50 }] },
                    { id: 49, scenario: "Disable the security system. Find the wire cutters.", clue: { name: 'cutters', emoji: '✂️' }, target: { name: 'panel', emoji: '🎛️' }, objects: [{ emoji: '🪑', name: 'desk', x: 25, y: 70, clue: true }, { emoji: '📷', name: 'camera', x: 80, y: 20 }, { emoji: '🚨', name: 'lasers', x: 50, y: 60 }, { emoji: '💨', name: 'vent', x: 10, y: 30 }] },
                    {
                        id: 50,
                        scenario: "Launch the rocket! First, find the fuel. Then, find the ignition key.",
                        objectives: [
                             { clue: { name: 'fuel can', emoji: '⛽' }, target: { name: 'rocket', emoji: '🚀' }, message: "The rocket is fueled up and ready!"},
                             { clue: { name: 'ignition key', emoji: '🔑' }, target: { name: 'control panel', emoji: '🎛️'}, message: "Ignition sequence started. Liftoff!"}
                        ],
                        objects: [
                            { emoji: '📦', name: 'crates', x: 15, y: 75, clue: 'fuel can' },
                            { emoji: '🏢', name: 'office', x: 80, y: 60, clue: 'ignition key'},
                            { emoji: '📡', name: 'antenna', x: 30, y: 20},
                            { emoji: '🚀', name: 'rocket', x: 50, y: 50, target: 'rocket' },
                            { emoji: '🎛️', name: 'control panel', x: 75, y: 80, target: 'control panel' }
                        ]
                    }
                ]
            };

            // --- GAME STATE ---
            const gameState = {
                currentLevel: 0,
                volume: 10,
                inventory: [],
                selectedItem: null,
                currentObjective: 0,
                highestLevelUnlocked: 1,
            };

            // --- PROGRESS MANAGEMENT ---
            function saveProgress() {
                try {
                    localStorage.setItem('mindCheckProgress', JSON.stringify({ highestLevel: gameState.highestLevelUnlocked }));
                } catch (e) {
                    console.error("Could not save progress:", e);
                }
            }

            function loadProgress() {
                try {
                    const savedData = JSON.parse(localStorage.getItem('mindCheckProgress'));
                    if (savedData && savedData.highestLevel) {
                        gameState.highestLevelUnlocked = savedData.highestLevel;
                    }
                } catch (e) {
                    console.error("Could not load progress:", e);
                }
                 if (gameState.highestLevelUnlocked > 1) {
                    playButton.textContent = "Continue";
                }
            }

            // --- MENU & NAVIGATION ---
            function showScreen(screen) {
                mainMenu.classList.add('hidden');
                optionsScreen.classList.add('hidden');
                levelSelectScreen.classList.add('hidden');
                gameContainer.style.display = 'none';
                screen.classList.remove('hidden');
                if (screen === gameContainer) {
                    gameContainer.style.display = 'flex';
                }
            }

            playButton.addEventListener('click', () => {
                showScreen(gameContainer);
                renderLevel(gameState.highestLevelUnlocked - 1);
            });
            optionsButton.addEventListener('click', () => showScreen(optionsScreen));
            levelSelectButton.addEventListener('click', () => {
                populateLevelSelect();
                showScreen(levelSelectScreen);
            });
            exitButton.addEventListener('click', () => {
                if (typeof Android !== "undefined" && Android.closeApp) {
                    Android.closeApp();
                } else {
                    mainMenu.innerHTML = `<h1 class="text-4xl text-center text-gray-700 game-title">Goodbye!</h1>`;
                }
            });
            backButton.addEventListener('click', () => showScreen(mainMenu));
            levelSelectBackButton.addEventListener('click', () => showScreen(mainMenu));
            mainMenuButton.addEventListener('click', () => showScreen(mainMenu));

            // ... Volume Controls ...
            volumeUp.addEventListener('click', () => {
                if (gameState.volume < 10) {
                    gameState.volume++;
                    volumeDisplay.textContent = gameState.volume;
                }
            });
            volumeDown.addEventListener('click', () => {
                if (gameState.volume > 0) {
                    gameState.volume--;
                    volumeDisplay.textContent = gameState.volume;
                }
            });

            // --- CORE GAME LOGIC ---
            function populateLevelSelect() {
                levelGrid.innerHTML = '';
                gameData.levels.forEach(level => {
                    const levelButton = document.createElement('button');
                    levelButton.classList.add('w-14', 'h-14', 'text-lg', 'font-bold', 'rounded-md', 'flex', 'items-center', 'justify-center', 'transition-all');
                    if (level.id <= gameState.highestLevelUnlocked) {
                        levelButton.textContent = level.id;
                        levelButton.classList.add('menu-button');
                        levelButton.addEventListener('click', () => {
                            showScreen(gameContainer);
                            renderLevel(level.id - 1);
                        });
                    } else {
                        levelButton.innerHTML = '🔒';
                        levelButton.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
                        levelButton.disabled = true;
                    }
                    levelGrid.appendChild(levelButton);
                });
            }

            function showMessage(text, buttonText = "Continue", onConfirm = () => {}) {
                messageText.textContent = text;
                const newButton = messageButton.cloneNode(true);
                newButton.textContent = buttonText;
                messageButton.parentNode.replaceChild(newButton, messageButton);
                messageButton = newButton;

                messageModal.classList.remove('hidden');

                const clickHandler = () => {
                    messageModal.classList.add('hidden');
                    onConfirm();
                    messageButton.removeEventListener('click', clickHandler);
                };
                messageButton.addEventListener('click', clickHandler);
            }

            function updateInventoryUI() {
                inventoryBox.innerHTML = '';
                if (gameState.inventory.length === 0) {
                    inventoryBox.innerHTML = `<p id="empty-inventory-text" class="text-gray-500">Empty</p>`;
                } else {
                    gameState.inventory.forEach(item => {
                        const inventoryItem = document.createElement('div');
                        inventoryItem.classList.add('inventory-item', 'p-2', 'rounded-lg');
                        inventoryItem.textContent = item.emoji;
                        inventoryItem.dataset.name = item.name;
                        if(gameState.selectedItem && gameState.selectedItem.name === item.name) {
                            inventoryItem.classList.add('selected');
                        }
                        inventoryItem.addEventListener('click', () => {
                            if (gameState.selectedItem && gameState.selectedItem.name === item.name) {
                                gameState.selectedItem = null;
                            } else {
                                gameState.selectedItem = item;
                            }
                            updateInventoryUI();
                        });
                        inventoryBox.appendChild(inventoryItem);
                    });
                }
            }

            function advanceToNextLevel() {
                const nextLevelIndex = gameState.currentLevel + 1;
                if ((nextLevelIndex + 1) > gameState.highestLevelUnlocked) {
                    gameState.highestLevelUnlocked = nextLevelIndex + 1;
                    saveProgress();
                }
                renderLevel(nextLevelIndex);
            }

            function renderLevel(levelIndex) {
                if (levelIndex >= gameData.levels.length) {
                    showMessage("Congratulations! You've completed all 50 levels of Mind Check!", "Play Again?", () => {
                        gameState.highestLevelUnlocked = 1;
                        saveProgress();
                        showScreen(mainMenu);
                    });
                    return;
                }

                gameState.currentLevel = levelIndex;
                const level = gameData.levels[levelIndex];
                gameState.inventory = [];
                gameState.selectedItem = null;
                gameState.currentObjective = 0;
                updateInventoryUI();

                levelDisplay.textContent = level.id;

                if(level.objectives) {
                    scenarioText.textContent = `Find the ${level.objectives[gameState.currentObjective].clue.name}.`;
                } else {
                    scenarioText.textContent = level.scenario;
                }

                gameScene.innerHTML = '';
                level.objects.forEach(obj => {
                    const objEl = document.createElement('div');
                    objEl.classList.add('scene-object');
                    objEl.textContent = obj.emoji;
                    objEl.style.left = `${obj.x}%`;
                    objEl.style.top = `${obj.y}%`;
                    objEl.dataset.name = obj.name;
                    objEl.addEventListener('click', () => handleObjectClick(obj, objEl, level));
                    gameScene.appendChild(objEl);
                });

                if (!level.objectives) {
                    const targetEl = document.createElement('div');
                    targetEl.classList.add('scene-object');
                    targetEl.textContent = level.target.emoji;
                    targetEl.style.left = '50%';
                    targetEl.style.top = '50%';
                    targetEl.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    targetEl.dataset.name = level.target.name;
                    targetEl.addEventListener('click', () => handleObjectClick({ name: level.target.name }, targetEl, level));
                    gameScene.appendChild(targetEl);
                }
            }

            function handleObjectClick(obj, element, level) {
                // --- Multi-objective levels ---
                if (level.objectives) {
                    const objective = level.objectives[gameState.currentObjective];
                    if (obj.clue === objective.clue.name && !gameState.inventory.find(i => i.name === obj.clue)) {
                        gameState.inventory.push(objective.clue);
                        updateInventoryUI();
                        element.style.display = 'none';
                        showMessage(`You found the ${objective.clue.name}!`, "Awesome!");
                    } else if (obj.target === objective.target.name) {
                        if (gameState.selectedItem && gameState.selectedItem.name === objective.clue.name) {
                             showMessage(objective.message, "Nice!", () => {
                                gameState.inventory = gameState.inventory.filter(i => i.name !== objective.clue.name);
                                gameState.selectedItem = null;
                                if(objective.clue.name === 'clay'){ gameState.inventory.push({ name: 'wet clay', emoji: '🧱' }); }
                                updateInventoryUI();
                                gameState.currentObjective++;
                                if (gameState.currentObjective >= level.objectives.length) {
                                    const motd = motivationalMessages[Math.floor(Math.random() * motivationalMessages.length)];
                                    showMessage(motd, "Next Level", advanceToNextLevel);
                                } else {
                                     scenarioText.textContent = `Find the ${level.objectives[gameState.currentObjective].clue.name}.`;
                                }
                            });
                        } else { showMessage("You need to use the right item here.", "Okay"); }
                    } else { showMessage(`That's a ${obj.name}. Not what you're looking for.`, "Right..."); }
                // --- Single-objective levels ---
                } else {
                    if (obj.clue && !gameState.inventory.find(item => item.name === level.clue.name)) {
                        gameState.inventory.push(level.clue);
                        updateInventoryUI();
                        element.style.display = 'none';
                        showMessage(`You found a ${level.clue.name}!`, "Got it!");
                    } else if (obj.name === level.target.name) {
                        if (gameState.selectedItem && gameState.selectedItem.name === level.clue.name) {
                            const motd = motivationalMessages[Math.floor(Math.random() * motivationalMessages.length)];
                            showMessage(`${motd} You solved it!`, "Next Level", advanceToNextLevel);
                        } else { showMessage(`This is the ${level.target.name}. You need to use an item.`, "Okay"); }
                    } else { showMessage(`This is a ${obj.name}. Nothing useful.`, "Keep looking"); }
                }
            }
            // Initial setup
            loadProgress();
        });
    </script>
